name: RenderCV

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install RenderCV
        run: |
          python -m pip install --upgrade pip
          pip install "rendercv[full]"
          
      - name: Render CV
        run: |
          rendercv render mahmoud_elhelaly_de_cv.yaml
          
      - name: Prepare Deployment
        run: |
          # Copy the first page PNG to the root of the deployment directory as thumbnail.png
          cp ./rendercv_output/Mahmoud_Elhelaly_CV_1.png ./rendercv_output/thumbnail.png
          # Copy our new index.html wrapper into the deployment directory
          cp index_de.html ./rendercv_output/
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./rendercv_output
          force_orphan: true
