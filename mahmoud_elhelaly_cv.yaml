    projects:
      - name: Electronics Retail Performance & Forecast 
        link: https://www.youtube.com/watch?v=UiCx9nMZZIU
        highlights:
          - "**Tech Stack:** SQL Server, Power BI, DAX, Excel, Power Query"
          - "**Problem:** Management lacked visibility into brand-level profitability and forecast variance."
          - "**Solution:** Built a drill-down dashboard comparing YoY historical data to real-time KPIs."
          - "**Impact:** Enabled data-driven procurement, optimizing stock and negotiating volume discounts."
          
      - name: Retail Data Warehouse & Strategic Analytics
        link: https://github.com/MGmahmoud/SQL-Data-Warehouse-and-Analytics-Project
        highlights:
          - "**Tech Stack:** SQL Server, Star Schema, Advanced T-SQL, Medallion Arch"
          - "**Problem:** Siloed CSVs from ERP/CRM caused data duplication and unreliable reporting."
          - "**Solution:** Built an ETL pipeline to transform raw files into a Gold-layer SSOT."
          - "**Impact:** Delivered RFM Segmentation and Pareto Analysis to optimize marketing spend."
          - "Architected a Medallion DWH (Bronze/Silver/Gold) to centralize disparate retail sources."
          - "Implemented a Star Schema model, reducing report generation latency by 70%."
          
