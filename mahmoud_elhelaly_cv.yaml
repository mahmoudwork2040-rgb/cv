        link: https://www.kaggle.com/code/mahmoudelhelaly/ibm-employee-attrition-analysis
        highlights:
          - "**Tech Stack:** Python (Scikit-Learn), XGBoost, Random Forest, Seaborn"
          - "**Problem:** Lack of quantitative tools to identify attrition root causes or predict churn risk."
          - "**Solution:** Performed EDA and built an XGBoost pipeline to identify high-risk employee segments."
          - "**Impact:** Created an early warning system for HR to apply proactive retention strategies."
          - "Developed a predictive model for employee turnover using a 1,400+ record dataset."
          - "Achieved 87% accuracy in identifying key churn drivers like salary and travel frequency."
      
      - name: Enterprise Banking ETL & Dimensional Modeling
        link: https://github.com/MGmahmoud/Bank_DWH_ETL
        highlights:
          - "**Tech Stack:** Informatica PowerCenter, Oracle SQL, PL/SQL, Star Schema"
          - "**Problem:** Core banking system degradation during month-end due to heavy reporting loads."
          - "**Solution:** Built an offloaded ETL pipeline and Oracle reporting layer with data validation."
          - "**Impact:** Improved reporting efficiency by 10X and ensured 100% audit-ready data accuracy."
          - "Architected a high-availability Informatica framework to offload production workloads."
          - "Engineered an Oracle Star Schema to optimize transactional data for regulatory reporting."
    
